name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build pyinstaller

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build Python wheel
        run: python -m build

      - name: Build Windows Companion
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --console `
            --name FastPackDoctor `
            --icon "${{ github.workspace }}\assets\branding\fastpack-doctor.ico" `
            --paths "${{ github.workspace }}\companion" `
            companion\fastpack.py

      - name: Assemble release packages
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if (-not $version) { $version = "dev" }
          $stage = Join-Path $PWD "release-staging"
          $artifacts = Join-Path $PWD "release-artifacts"
          New-Item -ItemType Directory -Force -Path $stage, $artifacts | Out-Null

          $windows = Join-Path $stage "FastPackDoctor-Windows-v$version"
          New-Item -ItemType Directory -Force -Path $windows | Out-Null
          Copy-Item dist\FastPackDoctor.exe $windows
          Copy-Item release\README_EN.txt, release\README_RU.txt, release\RUN_FASTPACK_DOCTOR.bat, LICENSE $windows
          Compress-Archive -Path $windows -DestinationPath (Join-Path $artifacts "FastPackDoctor-Windows-v$version.zip")

          $workshop = Join-Path $stage "ZomboidFastPackDoctor"
          New-Item -ItemType Directory -Force -Path (Join-Path $workshop "Contents\mods") | Out-Null
          Copy-Item assets\branding\workshop-preview.png (Join-Path $workshop "preview.png")
          Copy-Item workshop\workshop.txt $workshop
          Copy-Item workshop\README_EN.txt, workshop\README_RU.txt $workshop
          Copy-Item mod\ZomboidFastPackDoctor (Join-Path $workshop "Contents\mods") -Recurse
          Compress-Archive -Path $workshop -DestinationPath (Join-Path $artifacts "ZomboidFastPackDoctor-Workshop-v$version.zip")

          Copy-Item dist\*.whl $artifacts

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fastpack-doctor-release
          path: release-artifacts/*

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/*

